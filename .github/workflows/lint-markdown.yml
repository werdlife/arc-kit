name: Lint Markdown

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/lint-markdown.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/lint-markdown.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Dual-registration test for doc-types
        run: node scripts/tests/test-doc-types-dual-registration.mjs

      - name: Install npm deps for validator tests
        run: npm ci

      - name: Handoff schema validator tests (datascout)
        run: node tests/plugin/test_validate_handoff.mjs

      - name: Handoff schema validator tests (grants)
        run: node tests/plugin/test_validate_grants_handoff.mjs
