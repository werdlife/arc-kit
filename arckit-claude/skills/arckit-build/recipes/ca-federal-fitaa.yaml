# ArcKit build recipe — Canada Federal FITAA-class compliance suite
#
# Scope: Federal Canadian digital services that engage the Foreign Influence
# Transparency and Accountability Act (FITAA, Bill C-70 2024) — registration
# tooling, foreign-principal exposure tracking, public-office-holder
# interaction systems, and the supporting privacy / security / Charter /
# AI / Indigenous-data / Official-Languages / procurement obligations.
#
# Produces every artefact a FITAA-class build needs: FITAA assessment,
# Privacy Act PIA, ATIP reconciliation, Algorithmic Impact Assessment,
# Charter rights review, ITSG-33 Statement of Applicability, Security of
# Information Act handling plan, sovereign cloud residency, GC Digital
# Standards conformance, Official Languages Act review, PSPC procurement
# strategy, First Nations OCAP® sovereignty assessment (when Indigenous
# data in scope), plus the core ArcKit governance suite tailored for
# Canadian federal entities.
#
# Differences from uk-saas / uk-mod-sovereign / uae-federal-ai
#
#   Twelve ca-* community commands all included
#     ca-fitaa                      FITAA Bill C-70 2024 registration assessment
#     ca-pia                        Privacy Act + TBS Directive on PIA
#     ca-atip                       Access to Information / Privacy reconciliation
#     ca-aia                        TBS Directive on Automated Decision-Making
#     ca-charter                    Charter rights design review
#     ca-itsg-33                    ITSG-33 SoA + TBS Security Categorization
#     ca-soia                       Security of Information Act handling
#     ca-cloud-residency            GC sovereign cloud residency + CLOUD Act
#     ca-gc-digital-standards       10 GC Digital Standards scorecard
#     ca-ola                        Official Languages Act (Parts IV / V / VI)
#     ca-pspc                       PSPC Supply Manual + ICV / CFTA / CETA
#     ca-ocap                       First Nations OCAP® sovereignty (optional)
#
#   Differences from the UAE recipe specifically
#     - The Charter rights review (ca-charter) runs early because it
#       informs FITAA, PIA, and AIA design decisions (s.2 freedoms,
#       s.7 life/liberty/security, s.8 search/seizure, s.15 equality).
#     - SOIA handling is gated behind ca-itsg-33 because the SOI
#       register depends on the security categorization output.
#     - OCAP® is gated behind an optional flag (only when Indigenous
#       data is in scope) — running it speculatively would require
#       FNIGC pre-engagement that the model cannot perform.
#     - GCP research is included alongside AWS/Azure because Google
#       Cloud Canada (Montréal / Toronto) is now a viable federal option
#       under TBS direction-on-cloud-services.
#
#   Cloud research wave
#     arckit:research               foreign-influence registration tooling
#     arckit:aws-research           AWS Canada Central / West, sovereign options
#     arckit:azure-research         Azure Canada Central / Canada East
#     arckit:gcp-research           Google Cloud Canada (Montréal / Toronto)
#     arckit:datascout              Canadian federal open-data / Justice Laws

recipe: ca-federal-fitaa
schema_version: 1
description: >
  Canada Federal FITAA-class — full compliance suite for federal Canadian
  digital services that engage the Foreign Influence Transparency and
  Accountability Act (FITAA, Bill C-70 2024). Includes all 12 ca-*
  community commands (FITAA, PIA, ATIP, AIA, Charter, ITSG-33, SOIA,
  sovereign cloud residency, GC Digital Standards, Official Languages
  Act, PSPC procurement, OCAP®) plus the core ArcKit governance suite
  tailored for Canadian federal entities. The flow exercises every
  command against a coherent FITAA-class scenario.

defaults:
  version: "1.0"

optional_targets:
  AIP:
    description: AI Playbook (UK reference framework, useful cross-jurisdiction for AI in scope)
    default: false
  ORG_RESEARCH:
    description: Target federal entity research — RCMP / CBSA / CSIS / Public Safety strategy, mandate, structure, existing systems. Output to projects/000-global/research/ so the federal-entity context is shared across every Canadian project in the repo. Runs first (no deps) ahead of all other research.
    default: true
  AWS_RESEARCH:
    description: AWS Canada Central / West region availability + sovereign options (skip if Azure/GCP-only)
    default: true
  AZURE_RESEARCH:
    description: Azure Canada Central / Canada East — services, sovereign cloud, Protected B (skip if AWS/GCP-only)
    default: true
  GCP_RESEARCH:
    description: Google Cloud Canada (Montréal / Toronto) — services, residency, Protected B (skip if AWS/Azure-only)
    default: true
  DATASCOUT:
    description: Canadian federal open-data discovery — Justice Laws Website, Commissioner of Foreign Influence Transparency, GC Open Data
    default: false
  CA_OCAP:
    description: First Nations OCAP® sovereignty assessment — only enable when Indigenous data is in scope and FNIGC pre-engagement has been arranged
    default: false
  CA_SOIA:
    description: Security of Information Act handling plan — only enable when classified leads (PROTECTED C / SECRET / TOP SECRET) are in scope
    default: true
  DATA_MODEL:
    description: Data model with entity relationships and GDPR-equivalent governance (recommended for systems with PII)
    default: true
  TRACEABILITY:
    description: Requirements traceability matrix (recommended for FITAA-class governance audit)
    default: true

post_build_hooks:
  - skill: arckit:health
    args: ""
  - skill: arckit:pages
    args: ""

# ---------------------------------------------------------------------------
# Targets
# ---------------------------------------------------------------------------

targets:

  # --- Foundation ---------------------------------------------------------
  - id: PRIN
    skill: arckit:principles
    args: ""
    output: { project: "000-global", type: PRIN }
    deps: []

  - id: GLOSSARY
    skill: arckit:glossary
    args: "{P}"
    output: { project: "000-global", type: GLO }
    deps: [PRIN]

  - id: REQ
    skill: arckit:requirements
    args: "{NAME}"
    output: { project: "{P}-{NAME}", type: REQ }
    deps: [PRIN]

  - id: STKE
    skill: arckit:stakeholders
    args: "{NAME}"
    output: { project: "{P}-{NAME}", type: STKE }
    deps: [PRIN]

  # --- Research wave (parallel, before ADRs) ------------------------------
  # Org research runs first (no deps) and writes to projects/000-global/research/
  # so the federal-entity context (RCMP, CBSA, CSIS, Public Safety, etc.) is
  # shared across every Canadian project in the repo. Per-project research
  # targets all depend on ORG_RESEARCH so context flows organisation -> project.
  - id: ORG_RESEARCH
    skill: arckit:research
    topic: "Target federal entity — RCMP / CBSA / CSIS / Public Safety strategy, mandate, structure, existing systems, current digital posture"
    args: "{NAME} target-federal-entity strategy structure existing-systems"
    output: { project: "000-global", type: RSCH, subfolder: research, multi_instance: true }
    deps: []

  - id: RESEARCH
    skill: arckit:research
    topic: "Foreign-influence registration tooling — vendors, build vs buy, comparable jurisdictions"
    args: "{P} foreign-influence-registration-tooling"
    output: { project: "{P}-{NAME}", type: RSCH, subfolder: research, multi_instance: true }
    deps: [REQ, ORG_RESEARCH]

  - id: AWS_RESEARCH
    skill: arckit:aws-research
    topic: "AWS Canada Central / West — services, sovereign options, Protected B"
    args: "{P} canada-region"
    output: { project: "{P}-{NAME}", type: AWRS, subfolder: research, multi_instance: true }
    deps: [REQ, ORG_RESEARCH]

  - id: AZURE_RESEARCH
    skill: arckit:azure-research
    topic: "Azure Canada Central / Canada East — services, sovereign cloud, Protected B"
    args: "{P} canada-central canada-east"
    output: { project: "{P}-{NAME}", type: AZRS, subfolder: research, multi_instance: true }
    deps: [REQ, ORG_RESEARCH]

  - id: GCP_RESEARCH
    skill: arckit:gcp-research
    topic: "Google Cloud Canada (Montréal / Toronto) — services, residency, Protected B"
    args: "{P} canada-montreal canada-toronto"
    output: { project: "{P}-{NAME}", type: GCRS, subfolder: research, multi_instance: true }
    deps: [REQ, ORG_RESEARCH]

  - id: DATASCOUT
    skill: arckit:datascout
    topic: "Canadian federal open-data, Justice Laws Website, Commissioner of Foreign Influence Transparency"
    args: "{P}"
    output: { project: "{P}-{NAME}", type: DSCT, subfolder: research, multi_instance: true }
    deps: [REQ, ORG_RESEARCH]

  # --- Charter rights (early — informs FITAA / PIA / AIA design) ---------
  - id: CA_CHARTER
    skill: arckit:ca-charter
    args: "{P}"
    output: { project: "{P}-{NAME}", type: CHRT }
    deps: [REQ, STKE]

  # --- Privacy and access -------------------------------------------------
  # Privacy Act PIA is the foundational privacy artefact — every other
  # Canadian privacy / access / AI artefact builds on it.
  - id: CA_PIA
    skill: arckit:ca-pia
    args: "{P}"
    output: { project: "{P}-{NAME}", type: PIA }
    deps: [REQ, STKE]

  - id: CA_ATIP
    skill: arckit:ca-atip
    args: "{P}"
    output: { project: "{P}-{NAME}", type: ATIP }
    deps: [CA_PIA]

  - id: CA_AIA
    skill: arckit:ca-aia
    args: "{P}"
    output: { project: "{P}-{NAME}", type: AIA }
    deps: [REQ, CA_PIA]

  # --- FITAA flagship (after PIA / Charter / AIA available) --------------
  # FITAA is the apex compliance artefact for this recipe. It depends on
  # the privacy and Charter outputs so the foreign-influence registration
  # design can reflect rights-engaging mitigations and PII handling.
  - id: CA_FITAA
    skill: arckit:ca-fitaa
    args: "{P}"
    output: { project: "{P}-{NAME}", type: FITAA }
    deps: [REQ, STKE, CA_CHARTER, CA_PIA, CA_ATIP, CA_AIA]

  # --- Indigenous data (optional; only when applicable) -----------------
  # OCAP® First Nations sovereignty is gated behind an optional flag —
  # running it speculatively without FNIGC pre-engagement would produce
  # an artefact that cannot be relied on.
  - id: CA_OCAP
    skill: arckit:ca-ocap
    args: "{P}"
    output: { project: "{P}-{NAME}", type: OCAP }
    deps: [REQ, CA_PIA]

  # --- Security stream (after FITAA — system shape and SOI scope known) -
  - id: CA_ITSG
    skill: arckit:ca-itsg-33
    args: "{P}"
    output: { project: "{P}-{NAME}", type: ITSG }
    deps: [REQ, CA_PIA]

  - id: CA_SOIA
    skill: arckit:ca-soia
    args: "{P}"
    output: { project: "{P}-{NAME}", type: SOIA }
    deps: [CA_ITSG, CA_FITAA]

  # --- Cloud residency (after security) ---------------------------------
  - id: CA_CRES
    skill: arckit:ca-cloud-residency
    args: "{P}"
    output: { project: "{P}-{NAME}", type: CACR }
    deps: [CA_ITSG, AWS_RESEARCH, AZURE_RESEARCH, GCP_RESEARCH]

  # --- Service-side compliance (parallel after FITAA) -------------------
  - id: CA_OLA
    skill: arckit:ca-ola
    args: "{P}"
    output: { project: "{P}-{NAME}", type: OLA }
    deps: [REQ, CA_FITAA]

  - id: CA_DIGSTD
    skill: arckit:ca-gc-digital-standards
    args: "{P}"
    output: { project: "{P}-{NAME}", type: DIGSTD }
    deps: [REQ]

  # --- Procurement (towards the end) ------------------------------------
  - id: CA_PSPC
    skill: arckit:ca-pspc
    args: "{P}"
    output: { project: "{P}-{NAME}", type: PROC }
    deps: [REQ, CA_ITSG, CA_CRES]

  # --- Cross-cutting and supporting outputs -----------------------------
  - id: DATA_MODEL
    skill: arckit:data-model
    args: "{P}"
    output: { project: "{P}-{NAME}", type: DATA }
    deps: [REQ, CA_PIA, CA_ATIP]

  # --- Risk register (FITAA-class — pulls from rights / privacy / AI / sec)
  - id: RISK
    skill: arckit:risk
    args: "{P}"
    output: { project: "{P}-{NAME}", type: RISK }
    deps: [CA_FITAA, CA_PIA, CA_AIA, CA_CHARTER, CA_ITSG]

  # --- Strategic outputs ------------------------------------------------
  - id: WARDLEY
    skill: arckit:wardley
    args: "{NAME}"
    output: { project: "000-global", type: WARD }
    deps: [REQ, RESEARCH]

  # --- ADRs (each material decision becomes its own ADR) ----------------
  - id: ADR-001
    skill: arckit:adr
    topic: "Cloud platform and sovereign hosting (AWS Canada / Azure Canada / GCP Canada / private cloud)"
    args: "{P} {TOPIC}"
    output: { project: "{P}-{NAME}", type: ADR, subfolder: decisions, multi_instance: true }
    deps: [PRIN, REQ, AWS_RESEARCH, AZURE_RESEARCH, GCP_RESEARCH, CA_CRES]

  - id: ADR-002
    skill: arckit:adr
    topic: "Foreign-influence registration data model and severance design (FITAA + ATIP)"
    args: "{P} {TOPIC}"
    output: { project: "{P}-{NAME}", type: ADR, subfolder: decisions, multi_instance: true }
    deps: [PRIN, REQ, CA_FITAA, CA_ATIP]

  - id: ADR-003
    skill: arckit:adr
    topic: "Security categorization tier per TBS Standard (Protected A/B/C, SECRET, TOP SECRET)"
    args: "{P} {TOPIC}"
    output: { project: "{P}-{NAME}", type: ADR, subfolder: decisions, multi_instance: true }
    deps: [PRIN, REQ, CA_ITSG]

  - id: ADR-004
    skill: arckit:adr
    topic: "Algorithmic Impact Assessment level and human-in-the-loop boundary (TBS ADM Levels I-IV)"
    args: "{P} {TOPIC}"
    output: { project: "{P}-{NAME}", type: ADR, subfolder: decisions, multi_instance: true }
    deps: [PRIN, REQ, CA_AIA]

  - id: ADR-005
    skill: arckit:adr
    topic: "Bilingual service delivery — Translation Bureau pipeline vs in-house (Official Languages Act Parts IV / V)"
    args: "{P} {TOPIC}"
    output: { project: "{P}-{NAME}", type: ADR, subfolder: decisions, multi_instance: true }
    deps: [PRIN, REQ, CA_OLA]

  - id: ADR-006
    skill: arckit:adr
    topic: "Procurement route — PSPC Supply Manual / Standing Offer / AgileIQ / RFP with PSAB 5% target"
    args: "{P} {TOPIC}"
    output: { project: "{P}-{NAME}", type: ADR, subfolder: decisions, multi_instance: true }
    deps: [PRIN, REQ, CA_PSPC]

  # --- Strategic / business case (after most ca-* available) -----------
  - id: SOBC
    skill: arckit:sobc
    args: "{P}"
    output: { project: "{P}-{NAME}", type: SOBC }
    deps: [REQ, RISK, CA_PSPC]

  # --- Framework synthesis (executive view of all ca-* artefacts) ------
  - id: FRAMEWORK
    skill: arckit:framework
    args: "{P}"
    output: { project: "{P}-{NAME}", type: FWRK }
    deps:
      [SOBC, RISK,
       CA_FITAA, CA_PIA, CA_ATIP, CA_AIA, CA_CHARTER,
       CA_ITSG, CA_CRES,
       CA_OLA, CA_DIGSTD, CA_PSPC]

  # --- Cross-cutting traceability ---------------------------------------
  - id: TRACEABILITY
    skill: arckit:traceability
    args: "{P}"
    output: { project: "{P}-{NAME}", type: TRAC }
    deps: [REQ, CA_FITAA, CA_PIA, CA_ATIP, CA_ITSG]
